<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-buttons slot="start"><ion-menu-button></ion-menu-button></ion-buttons>
    <ion-title>Acerca de</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="tab5-content">
  <ion-header collapse="condense">
    <ion-toolbar>
      <ion-title size="large">Acerca de</ion-title>
    </ion-toolbar>
  </ion-header>

  <div class="container">
    <div class="logo-uneti-container">
      <img src="assets/logo-uneti.png" alt="Logo UNETI" class="logo-uneti" />
    </div>

    <ion-card class="glass-card about-card">
      <ion-card-header class="ion-text-center">
        <ion-card-title class="gradient-text">Mi Ionic App</ion-card-title>
        <p class="subtitle">Desarrollada por:</p>
        <h2 class="dev-name">Miguel Eduardo Arana</h2>
        <p class="dev-ci">C.I. 6.914.378</p>
      </ion-card-header>

      <ion-card-content class="ion-text-center">
        <ion-list lines="none" class="transparent-list">
          <ion-item>
            <ion-icon name="checkmark-circle" slot="start" color="success"></ion-icon>
            <ion-label class="ion-text-wrap">Solución implementada con Ionic + Angular</ion-label>
          </ion-item>
          <ion-item>
            <ion-icon name="school" slot="start" color="primary"></ion-icon>
            <ion-label class="ion-text-wrap">Para la UC Programación 3 M2 - Evaluación 2</ion-label>
          </ion-item>
          <ion-item>
            <ion-icon name="person" slot="start" color="tertiary"></ion-icon>
            <ion-label class="ion-text-wrap">Docente Guía: Prof. Carlos Marquez</ion-label>
          </ion-item>
          <ion-item>
            <ion-icon name="layers" slot="start" color="secondary"></ion-icon>
            <ion-label class="ion-text-wrap">Contiene menú lateral y pestañas inferiores para navegar</ion-label>
          </ion-item>
        </ion-list>
      </ion-card-content>
    </ion-card>
  </div>
</ion-content>
