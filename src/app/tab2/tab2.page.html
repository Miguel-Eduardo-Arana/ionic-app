<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-buttons slot="start"><ion-menu-button></ion-menu-button></ion-buttons>
    <ion-title>
      Información personal
    </ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="tab2-content">
  <ion-header collapse="condense">
    <ion-toolbar>
      <ion-title size="large">Información personal</ion-title>
    </ion-toolbar>
  </ion-header>

  <div class="container">
    <div class="avatar-container">
      <img src="assets/mi-perfil.png" alt="Foto de perfil" class="avatar-image" />
    </div>
    
    <ion-card class="glass-card info-card">
      <ion-card-header class="ion-text-center">
        <ion-card-title class="gradient-text">Datos Personales</ion-card-title>
      </ion-card-header>
      
      <ion-card-content>
        <ion-list lines="none" class="transparent-list">
          <ion-item>
            <ion-icon name="person-circle-outline" slot="start" color="primary"></ion-icon>
            <ion-label>
              <h2>Nombre</h2>
              <p>Miguel Eduardo Arana</p>
            </ion-label>
          </ion-item>
          
          <ion-item>
            <ion-icon name="briefcase-outline" slot="start" color="secondary"></ion-icon>
            <ion-label>
              <h2>Ocupación</h2>
              <p>Soporte Técnico Especializado</p>
            </ion-label>
          </ion-item>
          
          <ion-item>
            <ion-icon name="location-outline" slot="start" color="tertiary"></ion-icon>
            <ion-label>
              <h2>Ciudad</h2>
              <p>Caracas, Venezuela</p>
            </ion-label>
          </ion-item>
          
          <ion-item>
            <ion-icon name="game-controller-outline" slot="start" color="success"></ion-icon>
            <ion-label>
              <h2>Hobbies</h2>
              <p>Virtualización, Cloud, Código Abierto</p>
            </ion-label>
          </ion-item>
        </ion-list>
      </ion-card-content>
    </ion-card>
  </div>
</ion-content>
