<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-buttons slot="start"><ion-menu-button></ion-menu-button></ion-buttons>
    <ion-title>Contacto</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="tab3-content">
  <ion-header collapse="condense">
    <ion-toolbar>
      <ion-title size="large">Contacto</ion-title>
    </ion-toolbar>
  </ion-header>

  <div class="container">
    <ion-card class="glass-card contact-card">
      <ion-card-header class="ion-text-center">
        <ion-card-title class="gradient-text">Información de Contacto</ion-card-title>
      </ion-card-header>
      
      <ion-card-content>
        <ion-list lines="none" class="transparent-list">
          <ion-item>
            <ion-icon name="mail-outline" slot="start" color="primary"></ion-icon>
            <ion-label>miguel.eduardo.arana&#64;soportechvzla.com.ve</ion-label>
          </ion-item>
          <ion-item>
            <ion-icon name="call-outline" slot="start" color="success"></ion-icon>
            <ion-label>+58 412 2370549</ion-label>
          </ion-item>
          <ion-item>
            <ion-icon name="logo-github" slot="start" color="medium"></ion-icon>
            <ion-label>/Miguel-Eduardo-Arana</ion-label>
          </ion-item>
          <ion-item>
            <ion-icon name="logo-linkedin" slot="start" color="tertiary"></ion-icon>
            <ion-label>/in/miguel-eduardo-arana-abreu-b86663103</ion-label>
          </ion-item>
        </ion-list>

        <ion-button expand="block" class="primary-btn" (click)="enviarCorreo()">
          Enviar Información
        </ion-button>

        <div class="social-section">
          <h2 class="social-title">Redes Sociales</h2>
          <ion-grid>
            <ion-row class="ion-justify-content-center">
              <ion-col size="6">
                <ion-button expand="block" class="social-btn whatsapp" (click)="abrirLink('https://wa.me/584122370549?text=Hola')">
                  <ion-icon name="logo-whatsapp" slot="start"></ion-icon> WhatsApp
                </ion-button>
              </ion-col>
              <ion-col size="6">
                <ion-button expand="block" class="social-btn facebook" (click)="abrirLink('https://facebook.com/migueleduardo.aranaabreu')">
                  <ion-icon name="logo-facebook" slot="start"></ion-icon> Facebook
                </ion-button>
              </ion-col>
              <ion-col size="6">
                <ion-button expand="block" class="social-btn instagram" (click)="abrirLink('https://instagram.com/miguel.eduardo.arana')">
                  <ion-icon name="logo-instagram" slot="start"></ion-icon> Instagram
                </ion-button>
              </ion-col>
              <ion-col size="6">
                <ion-button expand="block" class="social-btn tiktok" (click)="abrirLink('https://tiktok.com/@miguel.eduardo.arana')">
                  <ion-icon name="logo-tiktok" slot="start"></ion-icon> TikTok
                </ion-button>
              </ion-col>
            </ion-row>
          </ion-grid>
        </div>
      </ion-card-content>
    </ion-card>
  </div>
</ion-content>
