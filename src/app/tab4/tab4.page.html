<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-buttons slot="start"><ion-menu-button></ion-menu-button></ion-buttons>
    <ion-title>Servicios</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="tab4-content">
  <ion-header collapse="condense">
    <ion-toolbar>
      <ion-title size="large">Servicios</ion-title>
    </ion-toolbar>
  </ion-header>

  <div class="container">
    <div class="header-section ion-text-center">
      <h1 class="gradient-text main-title">SoporTechVzla</h1>
      <p class="subtitle">Servicios Técnicos Especializados</p>
    </div>

    <ion-card class="glass-card intro-card">
      <ion-card-content class="ion-text-center">
        <p>Ofrecemos soluciones integrales en tecnología para impulsar tu negocio o proyecto personal.</p>
      </ion-card-content>
    </ion-card>

    <div class="services-grid">
      <ion-card class="glass-card service-card" *ngFor="let s of servicios">
        <ion-item lines="none" class="service-item">
          <ion-icon [name]="s.icon" slot="start" class="service-icon"></ion-icon>
          <ion-label>
            <h2>{{ s.title }}</h2>
            <p>{{ s.desc }}</p>
          </ion-label>
        </ion-item>
      </ion-card>
    </div>
  </div>
</ion-content>
